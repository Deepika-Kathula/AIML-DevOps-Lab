<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Aadhaar Card</title>

<style>
body{
    background: #f2f2f2;
    font-family: Arial, Helvetica, sans-serif;
}

.card{
    width: 620px;
    margin: 40px auto;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0px 0px 12px rgba(0,0,0,0.3);
    background: white;
}

.top{
    background: #FF9933;
    padding: 6px;
}

.bottom{
    background: #138808;
    padding: 6px;
}

.header{
    text-align: center;
    padding: 10px;
    border-bottom: 2px solid #ddd;
}

.header img{
    width: 70px;
}

.header h2{
    margin: 4px;
    color: #b30000;
}

.header h4{
    margin: 2px;
}

.main{
    display: flex;
    padding: 15px;
}

.photo{
    width: 150px;
    text-align: center;
}

.photo img{
    width: 120px;
    height: 140px;
    border: 2px solid #000;
}

.details{
    flex: 1;
    padding-left: 20px;
    font-size: 15px;
}

.details p{
    margin: 8px 0;
}

.aadhaar{
    text-align: center;
    font-size: 26px;
    letter-spacing: 4px;
    font-weight: bold;
    color: #000;
    margin-top: 10px;
}

.footer{
    text-align: center;
    font-size: 14px;
    padding: 8px;
}

.footer span{
    color: green;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="card">

    <div class="top"></div>

    <div class="header">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/55/Emblem_of_India.svg/800px-Emblem_of_India.svg.png">
        <h2>Government of India</h2>
        <h4>Unique Identification Authority of India</h4>
    </div>

    <div class="main">

        <div class="photo">
            <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
        </div>

        <div class="details">
            <p><b>Name:</b> Maloth Anjali</p>
            <p><b>Date of Birth:</b> 15/12/2005</p>
            <p><b>Gender:</b> Female</p>
            <p><b>Address:</b><br>
            Govindpet,<br>
            Nizamabad,<br>
            Telangana</p>
        </div>

    </div>

    <div class="aadhaar">
        1234 5678 9123
    </div>

    <div class="footer">
        <span>Aadhaar</span> – My Identity, My India
    </div>

    <div class="bottom"></div>

</div>

</body>
</html>
